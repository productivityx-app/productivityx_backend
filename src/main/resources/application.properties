# ─────────────────────────────────────────────
# application.properties  ← SAFE TO COMMIT
# Base config shared across all profiles.
# All secrets come from environment variables.
# ─────────────────────────────────────────────

# Server
server.port=${SERVER_PORT:8080}
spring.application.name=productivityx
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── PostgreSQL ────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/productivityx}
spring.datasource.username=${DATABASE_USERNAME:dev}
spring.datasource.password=${DATABASE_PASSWORD:dev}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.pool-name=ProductivityX-Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-init-sql=SET statement_timeout = '30s'
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# ── Flyway ────────────────────────────────────
# Disabled by default — enabled per profile (prod/dev)
spring.flyway.enabled=false

# ── Redis ─────────────────────────────────────
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# ── JWT ───────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiry-ms=${JWT_ACCESS_EXPIRY_MS:900000}
app.jwt.refresh-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}

# ── Gemini AI ─────────────────────────────────
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta

# ── Brevo Email ───────────────────────────────
app.brevo.api-key=${BREVO_API_KEY}
app.brevo.base-url=https://api.brevo.com/v3
app.brevo.sender-email=${BREVO_SENDER_EMAIL:noreply@productivityx.app}
app.brevo.sender-name=ProductivityX

# ── Firebase / FCM ────────────────────────────
# Set FIREBASE_ENABLED=true only when you add the service account JSON
app.firebase.enabled=${FIREBASE_ENABLED:false}

# ── App URLs ──────────────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.deep-link-base-url=${APP_DEEP_LINK_BASE_URL:productivityx://auth}

# ── CORS ──────────────────────────────────────
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

# ── Sync ──────────────────────────────────────
app.sync.conflict-threshold-ms=0

# ── Auth rules ────────────────────────────────
app.auth.max-failed-logins=5
app.auth.lock-duration-minutes=15
app.auth.max-resend-attempts=3
app.auth.resend-window-minutes=10
app.auth.verification-token-ttl-hours=24
app.auth.password-reset-token-ttl-hours=1

# ── Cookie ────────────────────────────────────
app.cookie.secure=${COOKIE_SECURE:true}

# ── Actuator ──────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── SpringDoc / Swagger ───────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ── Logging (base — overridden per profile) ───
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.stat=WARN
logging.level.org.flywaydb=INFO